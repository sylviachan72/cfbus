<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1130資訊板</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif; }
        body { background-color: #000000; color: #FFFFFF; height: 100vh; overflow: hidden; display: flex; flex-direction: column; padding: 5px; }
        #update-header { text-align: center; font-size: 20px; color: #888888; padding: 2px 0; flex-shrink: 0; }
        .main-container { display: flex; flex: 1; height: calc(100vh - 30px); overflow: hidden; }
        .left-column { width: 60%; height: 100%; overflow-y: auto; padding-right: 10px; border-right: 1px solid #222222; }
        .right-column { width: 40%; height: 100%; overflow-y: auto; padding-left: 10px; display: flex; flex-direction: column; align-items: center; }
        .left-column::-webkit-scrollbar, .right-column::-webkit-scrollbar { display: none; }
        
        .bus-row { padding: 12px 0; border-bottom: 1px solid #222222; font-size: 32px; }
        .bus-header { display: flex; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
        .route-badge { display: inline-block; padding: 2px 14px; border-radius: 12px; font-weight: bold; font-size: 34px; color: #FFFFFF; margin-right: 10px; }
        .bus-destination { color: #FFFFFF; margin-right: 10px; }
        .bus-station { color: #AAAAAA; font-size: 28px; }
        .eta-container { display: flex; flex-wrap: wrap; gap: 12px; }
        .eta-item { white-space: nowrap; }
        .time-normal { color: #FFFFFF; }
        .countdown-urgent { color: #FF3B30; font-weight: bold; }

        .time-box { font-size: 96px; font-weight: bold; color: #FFFFFF; line-height: 1.0; text-align: center; }
        .date-box { font-size: 24px; color: #FFFFFF; text-align: center; margin-top: -5px; margin-bottom: 15px; }
        .weather-info-block { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        .weather-line1 { display: flex; align-items: center; justify-content: center; font-size: 28px; color: #FFFFFF; }
        .weather-icon { width: 55px; height: 55px; margin-right: 5px; }
        .weather-line2 { display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .temp-max { color: #FF6666; margin-left: 15px; } .temp-min { color: #66B2FF; }
        .warning-box { width: 90%; text-align: center; margin-bottom: 15px; }
        .warning-badge { display: inline-block; background-color: #FF3B30; color: #FFFFFF; font-size: 26px; font-weight: bold; padding: 6px 16px; border-radius: 10px; margin: 4px; }
        .no-warning { color: #555555; font-size: 24px; text-align: center; }
        .swt-container { width: 100%; height: 90px; overflow: hidden; position: relative; font-size: 24px; color: #FFFFFF; border-top: 1px dashed #333333; padding-top: 8px; }
        .marquee-content { position: absolute; width: 100%; animation: marqueeUp 15s linear infinite; }
        @keyframes marqueeUp { 0% { top: 100%; } 100% { top: -100%; } }
    </style>
</head>
<body>

    <div id="update-header">最後更新：--:--:-- (每30秒自動刷新)</div>

    <div class="main-container">
        <div class="left-column" id="bus-panel"><div style="color: #555555; font-size: 32px; padding: 20px;">載入中...</div></div>
        <div class="right-column">
            <div class="time-box" id="live-time">00:00</div>
            <div class="date-box" id="live-date">--年--月--日 --</div>
            <div class="weather-info-block">
                <div class="weather-line1"><img id="wx-icon" class="weather-icon" src="" style="display:none;"><span id="curr-temp">--°C</span><span id="curr-humidity" style="margin-left:15px;">💧 --%</span></div>
                <div class="weather-line2"><span class="temp-min">❄️ <span id="forecast-min">--</span>°C</span><span class="temp-max">☀️ <span id="forecast-max">--</span>°C</span></div>
            </div>
            <div class="warning-box" id="warning-panel"><div class="no-warning">現時沒有生效的警告</div></div>
            <div class="swt-container" id="swt-panel" style="display:none;"><div class="marquee-content" id="swt-text"></div></div>
        </div>
    </div>

    <script>
        const routeColors = { '33X': '#007AFF', '40': '#34C759', '95C': '#FF9500', '970X': '#AF52DE', '38': '#FF2D55', '37A': '#5AC8FA', '37B': '#FFCC00', '37X': '#E55737' };
        const busConfig = [
            { route: '33X', stopId: '002184', stopName: '置富1-7座' }, { route: '40', stopId: '002184', stopName: '置富1-7座' },
            { route: '95C', stopId: '002184', stopName: '置富1-7座' }, { route: '970X', stopId: '002184', stopName: '置富1-7座' },
            { route: '38', stopId: '002190', stopName: '雅緻洋房' }, { route: '37A', stopId: '002186', stopName: '置富總站' },
            { route: '37B', stopId: '002186', stopName: '置富總站' }, { route: '37X', stopId: '002186', stopName: '置富總站' }
        ];

        async function fetchAllData() {
            // 時間日期
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('zh-HK', {hour: '2-digit', minute:'2-digit', hour12: false});
            document.getElementById('live-date').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${['日','一','二','三','四','五','六'][now.getDay()]}`;
            document.getElementById('update-header').innerText = `最後更新：${now.toLocaleTimeString()} (每30秒自動刷新)`;

            // 1. 巴士
            const panel = document.getElementById('bus-panel');
            let htmlContent = '';
            for (const config of busConfig) {
                try {
                    const res = await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${config.stopId}/${config.route}`);
                    const json = await res.json();
                    let etaList = (json.data || []).filter(i => i.rmk_tc !== "距離太遠，未能提供時間");
                    if (['37A', '37B', '37X'].includes(config.route)) etaList = etaList.filter(i => i.dest_tc && !i.dest_tc.includes('置富'));
                    etaList = etaList.slice(0, 3);
                    let dest = etaList.length > 0 ? `往 ${etaList[0].dest_tc}` : "載入中...";
                    htmlContent += `<div class="bus-row"><div class="bus-header"><span class="route-badge" style="background-color:${routeColors[config.route]}">${config.route}</span><span class="bus-destination">${dest}</span><span class="bus-station">📍${config.stopName}</span></div><div class="eta-container">`;
                    if (etaList.length === 0) htmlContent += `暫無班次`;
                    else etaList.forEach((eta, i) => {
                        const m = Math.max(0, Math.floor((new Date(eta.eta) - new Date()) / 60000));
                        htmlContent += `<div class="eta-item"><span class="time-normal">${eta.eta.substring(11,16)}</span><span class="${m < 10 ? 'countdown-urgent' : ''}">(${m}分)</span>${i < etaList.length-1 ? ' | ' : ''}</div>`;
                    });
                    htmlContent += `</div></div>`;
                } catch(e) {}
            }
            panel.innerHTML = htmlContent;

            // 2. 天氣概況與預測
            try {
                const rhr = await (await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc')).json();
                document.getElementById('curr-temp').innerText = rhr.temperature.data.find(t => t.place === '香港天文台').value + '°C';
                document.getElementById('curr-humidity').innerText = '💧 ' + rhr.humidity.data[0].value + '%';
                document.getElementById('wx-icon').src = `https://www.weather.gov.hk/images/HKOWxIconOutline/pic${rhr.icon[0]}.png`;
                document.getElementById('wx-icon').style.display = 'inline-block';
                const fnd = await (await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc')).json();
                document.getElementById('forecast-min').innerText = fnd.weatherForecast[0].forecastMintemp.value;
                document.getElementById('forecast-max').innerText = fnd.weatherForecast[0].forecastMaxtemp.value;

                // 3. 天氣警告 (加入 warnsum 獲取)
                const warn = await (await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc')).json();
                let badges = '';
                Object.values(warn).forEach(w => badges += `<span class="warning-badge">${w.name}</span>`);
                document.getElementById('warning-panel').innerHTML = badges || '<div class="no-warning">現時沒有生效的警告</div>';

                // 4. 特別天氣提示
                const swt = await (await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=tc')).json();
                if(swt.swt && swt.swt.length > 0) {
                    document.getElementById('swt-text').innerText = swt.swt.map(s => s.desc).join(' | ');
                    document.getElementById('swt-panel').style.display = 'block';
                } else {
                    document.getElementById('swt-panel').style.display = 'none';
                }
            } catch(e) {}
        }

        setInterval(fetchAllData, 30000);
        fetchAllData();
    </script>
</body>
</html>
