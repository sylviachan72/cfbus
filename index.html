<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1255資訊看板</title>
    <style>
        /* 全域設定：極致緊湊、純黑背景 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 頂部最後更新時間 */
        .top-bar {
            width: 100%;
            text-align: center;
            font-size: 24px;
            color: #ffffff;
            padding: 2px 0;
            background-color: #111111;
            font-weight: bold;
        }

        /* 左右分欄佈局 */
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 36px);
            overflow: hidden;
        }

        /* 左欄：巴士資訊 (60%) */
        .left-col {
            width: 60%;
            border-right: 2px solid #222222;
            padding: 4px 8px;
            overflow-y: auto;
            scrollbar-width: none; /* 隱藏滾動條 (Firefox) */
        }
        .left-col::-webkit-scrollbar {
            display: none; /* 隱藏滾動條 (Chrome/Safari) */
        }

        /* 右欄：時間與天氣 (40%) */
        .right-col {
            width: 40%;
            padding: 4px 8px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .right-col::-webkit-scrollbar {
            display: none;
        }

        /* 巴士路線單行樣式 */
        .bus-row {
            padding: 6px 0;
            border-bottom: 1px solid #222222;
            word-wrap: break-word;
        }
        .bus-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 2px;
        }
        .bus-tag {
            color: #ffffff;
            font-weight: bold;
            font-size: 32px;
            padding: 2px 12px;
            border-radius: 12px;
            display: inline-block;
            min-width: 90px;
            text-align: center;
        }
        .bus-dest {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
        }
        .bus-stop {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
        }
        .bus-eta-container {
            font-size: 34px;
            font-weight: bold;
            margin-top: 2px;
            padding-left: 4px;
        }
        .eta-item {
            display: inline-block;
        }
        .eta-split {
            color: #555555;
            margin: 0 8px;
        }
        .countdown-urgent {
            color: #ff4d4d; /* 少於10分鐘顯示紅色 */
        }
        .countdown-normal {
            color: #ffffff; /* 多於10分鐘顯示白色 */
        }

        /* 右欄：時間區塊 (緊湊置中) */
        .time-block {
            text-align: center;
            margin-bottom: 0px;
        }
        #current-time {
            font-size: 96px;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.0;
        }
        #current-date {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin-top: -4px; /* 讓日期極致緊貼時間 */
        }

        /* 右欄：天氣報告區塊 (零縫隙貼合) */
        .weather-block {
            text-align: center;
            margin-top: 4px;
        }
        .weather-row1 {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            gap: 8px;
        }
        .weather-icon-img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }
        .weather-row2 {
            font-size: 24px;
            font-weight: bold;
            margin-top: 0px; /* 零縫隙貼合第一行 */
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        .temp-max { color: #ff4d4d; }
        .temp-min { color: #4da6ff; }

        /* 天氣警告區塊 - 修改為平排緊湊顯示 */
        .warning-block {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap; /* 允許自動換行平排 */
            justify-content: center; /* 置中對齊 */
            gap: 6px; /* 標籤之間的微小間距 */
        }
        .warning-tag {
            background-color: #cc0000; /* 紅色圓角底 */
            color: #ffffff;            /* 白字 */
            font-size: 24px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 10px;
        }
        .no-warning {
            font-size: 24px;
            color: #666666; /* 較暗的灰色 */
            font-weight: bold;
            padding: 4px 0;
            width: 100%; /* 確保無警告時文字能單獨佔滿置中 */
            text-align: center;
        }

        /* 特別天氣提示區塊（垂直跑馬燈結構） */
        .swt-block {
            margin-top: 8px;
            border-top: 1px dashed #333333;
            padding-top: 4px;
            height: 90px; /* 限制約 3 行高度 */
            overflow: hidden;
            position: relative;
        }
        .swt-marquee-content {
            font-size: 24px;
            color: #ffffff;
            text-align: left;
            position: absolute;
            width: 100%;
            animation: scrollUp 15s linear infinite;
        }
        .swt-marquee-content p {
            margin-bottom: 6px;
            line-height: 1.2;
        }

        /* 從下往上滾動動畫 */
        @keyframes scrollUp {
            0% { transform: translateY(90px); }
            100% { transform: translateY(-100%); }
        }
    </style>
</head>
<body>

    <div class="top-bar">最後更新時間：<span id="last-update">--:--:--</span>(每30秒自動刷新)</div>

    <div class="main-container">
        
        <div class="left-col" id="bus-list">
            </div>

        <div class="right-col">
            <div class="time-block">
                <div id="current-time">--:--</div>
                <div id="current-date">----年--月--日 星期-</div>
            </div>

            <div class="weather-block">
                <div class="weather-row1">
                    <img id="wx-icon" class="weather-icon-img" src="" alt="" style="display:none;">
                    <span id="curr-temp">--°C</span>
                    <span id="curr-humidity">💧--%</span>
                </div>
                <div class="weather-row2">
                    <span class="temp-max">☀️ <span id="forecast-max">--</span>°C</span>
                    <span class="temp-min">❄️ <span id="forecast-min">--</span>°C</span>
                </div>
            </div>

            <div class="warning-block" id="warning-container">
                <div class="no-warning">現時沒有生效的警告/提示</div>
            </div>

            <div class="swt-block" id="swt-container">
                <div class="swt-marquee-content" id="swt-content">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // 巴士路線與站點配置檔
        const busConfig = [
            { route: '33X',  stop: '002184', name: '置富1-7座', color: '#0056b3', circular: false },
            { route: '40',   stop: '002184', name: '置富1-7座', color: '#d97706', circular: false },
            { route: '95C',  stop: '002184', name: '置富1-7座', color: '#16a34a', circular: false },
            { route: '970X', stop: '002184', name: '置富1-7座', color: '#7c3aed', circular: false },
            { route: '38',   stop: '002190', name: '雅緻洋房', color: '#dc2626', circular: false },
            { route: '37A',  stop: '002186', name: '置富總站', color: '#0891b2', circular: true },
            { route: '37B',  stop: '002186', name: '置富總站', color: '#db2777', circular: true },
            { route: '37X',  stop: '002186', name: '置富總站', color: '#854d0e', circular: true }
        ];

        // 天氣警告子類型對照表
        const warningMap = {
            "WFIREY": "黃色火災危險警告",
            "WFIRER": "紅色火災危險警告",
            "WRAINA": "黃色暴雨警告信號",
            "WRAINR": "紅色暴雨警告信號",
            "WRAINB": "黑色暴雨警告信號",
            "TC1": "一號戒備信號",
            "TC3": "三號強風信號",
            "TC8NE": "八號東北烈風或暴風信號",
            "TC8SE": "八號東南烈風或暴風信號",
            "TC8SW": "八號西南烈風或暴風信號",
            "TC8NW": "八號西北烈風或暴風信號",
            "TC9": "九號烈風或暴風風力增強信號",
            "TC10": "十號颶風信號"
        };

        // 1. 更新時鐘與日期 (每秒更新，12小時制)
        function updateClock() {
            const now = new Date();
            
            // 時間格式化 (12小時制)
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            hours = hours % 12;
            hours = hours ? hours : 12; // 0點顯示為12
            const hoursStr = String(hours).padStart(2, '0');
            document.getElementById('current-time').innerText = `${hoursStr}:${minutes}`;

            // 日期與星期格式化
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const dayName = weekDays[now.getDay()];
            document.getElementById('current-date').innerText = `${year}年${month}月${date}日 ${dayName}`;
        }

        // 2. 獲取巴士實時 ETA 數據
        async function fetchBusETA() {
            const listContainer = document.getElementById('bus-list');
            let htmlContent = '';

            for (const bus of busConfig) {
                try {
                    const url = `https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${bus.stop}/${bus.route}`;
                    const response = await fetch(url);
                    const result = await response.json();
                    
                    if (result && result.data) {
                        // 過濾出屬於該路線的班次
                        let etaList = result.data.filter(item => item.route === bus.route);

                        // 如果是循環線 (37A, 37B, 37X)，過濾掉目的地包含「置富」的班次
                        if (bus.circular) {
                            etaList = etaList.filter(item => !item.dest_tc.includes('置富'));
                        }

                        // 取前三個班次
                        const nextThree = etaList.slice(0, 3);

                        if (nextThree.length > 0) {
                            const destName = nextThree[0].dest_tc; // 獲取方向全稱
                            
                            let etaHtml = '';
                            nextThree.forEach((item, index) => {
                                if (!item.eta) return;
                                
                                const etaTime = new Date(item.eta);
                                const now = new Date();
                                const diffMs = etaTime - now;
                                const diffMins = Math.max(0, Math.floor(diffMs / 1000 / 60));

                                // 格式化到達時間為 HH:mm
                                const hh = String(etaTime.getHours()).padStart(2, '0');
                                const mm = String(etaTime.getMinutes()).padStart(2, '0');

                                // 根據時間決定倒數顏色邏輯
                                let countdownClass = 'countdown-normal';
                                if (diffMins < 10) {
                                    countdownClass = 'countdown-urgent'; // 少於10分鐘變紅
                                }

                                etaHtml += `<span class="eta-item">${hh}:${mm}<span class="${countdownClass}">(${diffMins}分鐘)</span></span>`;
                                if (index < nextThree.length - 1) {
                                    etaHtml += `<span class="eta-split">｜</span>`;
                                }
                            });

                            htmlContent += `
                                <div class="bus-row">
                                    <div class="bus-header">
                                        <span class="bus-tag" style="background-color: ${bus.color};">${bus.route}</span>
                                        <span class="bus-dest">往${destName}</span>
                                        <span class="bus-stop">📍${bus.name}</span>
                                    </div>
                                    <div class="bus-eta-container">
                                        ${etaHtml || '--:--'}
                                    </div>
                                </div>
                            `;
                        } else {
                            // 無班次時顯示
                            htmlContent += `
                                <div class="bus-row">
                                    <div class="bus-header">
                                        <span class="bus-tag" style="background-color: ${bus.color};">${bus.route}</span>
                                        <span class="bus-stop">📍${bus.name}</span>
                                    </div>
                                    <div class="bus-eta-container" style="color: #666666; font-size:30px;">現時沒有即時班次資訊</div>
                                </div>
                            `;
                        }
                    }
                } catch (error) {
                    console.error(`讀取巴士 ${bus.route} 發生錯誤:`, error);
                }
            }
            listContainer.innerHTML = htmlContent;
        }

        // 3. 獲取香港天文台實時天氣與預報數據
        async function fetchWeather() {
            try {
                // A. 讀取現時天氣 (rhrread)
                const rhrResponse = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const rhrData = await rhrResponse.json();

                if (rhrData) {
                    // 提取溫度（優先找香港天文台站，若無則取第一個站）
                    let currentTemp = '--';
                    if (rhrData.temperature && rhrData.temperature.data) {
                        const hkoTemp = rhrData.temperature.data.find(item => item.place === '香港天文台');
                        currentTemp = hkoTemp ? hkoTemp.value : rhrData.temperature.data[0].value;
                    }
                    document.getElementById('curr-temp').innerText = `${currentTemp}°C`;

                    // 提取相對濕度
                    if (rhrData.humidity && rhrData.humidity.data && rhrData.humidity.data[0]) {
                        document.getElementById('curr-humidity').innerText = `💧${rhrData.humidity.data[0].value}%`;
                    }

                    // 提取天氣圖標 (使用專為深色背景設計的透明線條版 HKOWxIconOutline)
                    if (rhrData.icon && rhrData.icon[0]) {
                        const iconId = rhrData.icon[0];
                        const iconImg = document.getElementById('wx-icon');
                        iconImg.src = `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${iconId}.png`;
                        iconImg.style.display = 'inline-block';
                    }
                }

                // B. 讀取今日最高/最低氣溫 (fnd)
                const fndResponse = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const fndData = await fndResponse.json();
                if (fndData && fndData.weatherForecast && fndData.weatherForecast[0]) {
                    const todayForecast = fndData.weatherForecast[0];
                    document.getElementById('forecast-max').innerText = todayForecast.forecastMaxtemp.value;
                    document.getElementById('forecast-min').innerText = todayForecast.forecastMintemp.value;
                }
            } catch (error) {
                console.error("讀取天氣數據發生錯誤:", error);
            }
        }

        // 4. 獲取天氣警告數據 (支援子類型映射)
        async function fetchWarnings() {
            const container = document.getElementById('warning-container');
            try {
                const response = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
                const data = await response.json();
                
                let warningHtml = '';
                
                if (data && Object.keys(data).length > 0) {
                    // 遍歷所有生效的警告主類型
                    for (const key in data) {
                        const warningItem = data[key];
                        // 優先檢查 API 是否提供更具體的子類型代碼 (code)，若無則採用主類型 key
                        const subTypeCode = warningItem.code || key;
                        
                        if (warningMap[subTypeCode]) {
                            warningHtml += `<div class="warning-tag">${warningMap[subTypeCode]}</div>`;
                        } else if (warningItem.name) {
                            // 備用機制：如果對照表沒收錄，直接顯示 API 回傳的中文名稱
                            warningHtml += `<div class="warning-tag">${warningItem.name}</div>`;
                        }
                    }
                }

                if (warningHtml !== '') {
                    container.innerHTML = warningHtml;
                } else {
                    container.innerHTML = '<div class="no-warning">現時沒有生效的警告/提示</div>';
                }
            } catch (error) {
                console.error("讀取天氣警告發生錯誤:", error);
                container.innerHTML = '<div class="no-warning">現時沒有生效的警告/提示</div>';
            }
        }

        // 5. 獲取特別天氣提示 (SWT) 並處理垂直跑馬燈
        async function fetchSWT() {
            const contentDiv = document.getElementById('swt-content');
            try {
                const response = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=tc');
                const data = await response.json();
                
                let swtText = '';
                
                // 已經修正為正確的 API 鍵值 data.swt
                if (data && data.swt && data.swt.length > 0) {
                    data.swt.forEach(tip => {
                        if (tip.desc) {
                            swtText += `<p>${tip.desc}</p>`;
                        }
                    });
                }

                if (swtText !== '') {
                    contentDiv.innerHTML = swtText;
                    // 重設跑馬燈動畫，確保文字過長時自動從下往上滾動
                    contentDiv.style.animation = 'none';
                    contentDiv.offsetHeight; /* 觸發重繪 */
                    contentDiv.style.animation = 'scrollUp 20s linear infinite';
                } else {
                    contentDiv.innerHTML = '<p style="color:#666666; text-align:center; font-weight:bold;">現時沒有特別天氣提示</p>';
                    contentDiv.style.animation = 'none'; // 沒有文字時不滾動，靜態置中
                }
            } catch (error) {
                console.error("讀取特別天氣提示發生錯誤:", error);
                contentDiv.innerHTML = '<p style="color:#666666; text-align:center;">暫時無法讀取提示</p>';
                contentDiv.style.animation = 'none';
            }
        }

        // 6. 更新頂部的「最後更新時間」 (24小時制，包含秒數)
        function updateRefreshTime() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('last-update').innerText = `${hh}:${mm}:${ss}`;
        }

        // 7. 統籌所有 API 的自動重新整理
        async function refreshAllData() {
            await Promise.all([
                fetchBusETA(),
                fetchWeather(),
                fetchWarnings(),
                fetchSWT()
            ]);
            updateRefreshTime();
        }

        // 初始化啟動
        updateClock();
        refreshAllData();

        // 設置計時器
        setInterval(updateClock, 1000);       // 每 1 秒鐘更新一次右側時鐘
        setInterval(refreshAllData, 30000);    // 每 30 秒鐘自動重新整理所有數據
    </script>
</body>
</html>
