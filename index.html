<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>置富巴士天氣資訊板</title>
    <style>
        /* 全域樣式：極致緊湊、高對比度 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            letter-spacing: 1px;
        }

        /* 頂部最後更新時間 */
        .top-bar {
            text-align: center;
            color: #AAAAAA;
            font-size: 18px;
            padding: 4px 0;
            background-color: #000000;
            flex-shrink: 0;
            border-bottom: 1px solid #222222;
        }

        /* 主內容區：左右分欄 */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左欄：巴士資訊 (60%) */
        .left-col {
            width: 60%;
            height: 100%;
            overflow-y: auto;
            padding: 6px;
            border-right: 2px solid #333333;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .left-col::-webkit-scrollbar {
            display: none;
        }

        /* 右欄：時間與天氣 (40%) */
        .right-col {
            width: 40%;
            height: 100%;
            overflow-y: auto;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .right-col::-webkit-scrollbar {
            display: none;
        }

        /* 巴士路線區塊樣式 */
        .bus-row {
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #222222;
            word-wrap: break-word;
            white-space: normal;
        }
        .bus-header {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .route-badge {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 12px;
            color: #FFFFFF;
            margin-right: 10px;
            font-size: 34px;
        }
        .route-33X { background-color: #0056B3; }
        .route-40  { background-color: #1E7E34; }
        .route-95C { background-color: #D39E00; }
        .route-970X{ background-color: #6F42C1; }
        .route-38  { background-color: #C82333; }
        .route-37A { background-color: #17A2B8; }
        .route-37B { background-color: #E83E8C; }
        .route-37X { background-color: #FD7E14; }
        
        .bus-dir {
            color: #FFFFFF;
            margin-right: 8px;
        }
        .bus-stop {
            color: #FFFFFF;
            font-size: 30px;
        }

        /* 預計到達時間樣式 */
        .eta-container {
            font-size: 32px;
            font-weight: bold;
            margin-top: 4px;
        }
        .eta-item {
            display: inline-block;
        }
        .eta-split {
            color: #555555;
            margin: 0 8px;
        }
        .time-white { color: #FFFFFF; }
        .countdown-red { color: #FF4444; }
        .countdown-white { color: #FFFFFF; }

        /* 右欄：時間與日期細節 (極致緊湊) */
        .clock-section {
            text-align: center;
            margin-bottom: 0px;
        }
        .clock {
            font-size: 96px;
            font-weight: bold;
            color: #FFFFFF;
            line-height: 1.0;
        }
        .date {
            font-size: 28px;
            color: #FFFFFF;
            margin-top: -4px;
            margin-bottom: 8px;
        }

        /* 天氣報告區塊 (零縫隙貼合) */
        .weather-section {
            width: 100%;
            text-align: center;
        }
        .weather-row1 {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            line-height: 1.1;
        }
        .weather-icon {
            width: 52px;
            height: 52px;
            margin-right: 8px;
        }
        .weather-row2 {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            padding: 0;
            line-height: 1.1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .temp-max { color: #FF4444; }
        .temp-min { color: #44AAFF; }

        /* 天氣警告與提示區塊 */
        .alert-section {
            width: 100%;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 警告橫排緊湊版：統一紅色圓角底、白字 */
        .warnings-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-bottom: 8px;
        }
        .warning-badge {
            display: inline-block;
            background-color: #CC0000;
            color: #FFFFFF;
            font-size: 22px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 8px;
            white-space: nowrap;
        }
        
        /* 垂直跑馬燈容器（更加緊湊，限高70px） */
        .marquee-container {
            height: 70px;
            overflow: hidden;
            position: relative;
            text-align: left;
            width: 100%;
            border-top: 1px dashed #333333;
            padding-top: 4px;
        }
        .marquee-content {
            position: absolute;
            width: 100%;
            font-size: 22px;
            color: #FFFFFF;
            line-height: 28px;
            animation: scrollUp 20s linear infinite;
        }
        .marquee-content:hover {
            animation-play-state: paused;
        }
        @keyframes scrollUp {
            0% { transform: translateY(70px); }
            100% { transform: translateY(-100%); }
        }

        /* 無警告提示時的暗灰色樣式 */
        .no-alerts {
            color: #666666;
            font-size: 24px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="top-bar" id="update-timestamp">最後更新：載入中... (每30秒自動刷新)</div>

    <div class="main-content">
        
        <div class="left-col" id="bus-panel">
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-33X">33X</span><span class="bus-dir">往西九龍站</span><span class="bus-stop">📍置富1-7座</span></div><div class="eta-container" id="eta-33X">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-40">40</span><span class="bus-dir">往灣仔北</span><span class="bus-stop">📍置富1-7座</span></div><div class="eta-container" id="eta-40">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-95C">95C</span><span class="bus-dir">往鴨脷洲邨</span><span class="bus-stop">📍置富1-7座</span></div><div class="eta-container" id="eta-95C">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-970X">970X</span><span class="bus-dir">往蘇屋</span><span class="bus-stop">📍置富1-7座</span></div><div class="eta-container" id="eta-970X">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-38">38</span><span class="bus-dir">往筲箕灣</span><span class="bus-stop">📍雅緻洋房</span></div><div class="eta-container" id="eta-38">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-37A">37A</span><span class="bus-dir">往中環</span><span class="bus-stop">📍置富總站</span></div><div class="eta-container" id="eta-37A">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-37B">37B</span><span class="bus-dir">往金鐘</span><span class="bus-stop">📍置富總站</span></div><div class="eta-container" id="eta-37B">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-37X">37X</span><span class="bus-dir">往中環(特快)</span><span class="bus-stop">📍置富總站</span></div><div class="eta-container" id="eta-37X">讀取中...</div></div>
        </div>

        <div class="right-col">
            <div class="clock-section">
                <div class="clock" id="clock">00:00</div>
                <div class="date" id="date">--</div>
            </div>

            <div class="weather-section">
                <div class="weather-row1">
                    <img src="" alt="天氣圖標" class="weather-icon" id="wx-icon" style="display:none;">
                    <span id="curr-temp">--°C</span>
                    <span style="margin-left:12px;">💧</span><span id="curr-humidity">--%</span>
                </div>
                <div class="weather-row2">
                    <span class="temp-max">☀️ <span id="forecast-max">--</span>°C</span>
                    <span class="temp-min">❄️ <span id="forecast-min">--</span>°C</span>
                </div>
            </div>

            <div class="alert-section" id="alert-panel">
                <div class="no-alerts">現時沒有生效的警告/提示</div>
            </div>
        </div>

    </div>

    <script>
        const busConfigs = [
            { route: '33X', stop: '002184' },
            { route: '40',  stop: '002184' },
            { route: '95C', stop: '002184' },
            { route: '970X',stop: '002184' },
            { route: '38',  stop: '002190' },
            { route: '37A', stop: '002186' },
            { route: '37B', stop: '002186' },
            { route: '37X', stop: '002186' }
        ];

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            hours = hours % 12;
            hours = hours ? hours : 12;
            document.getElementById('clock').textContent = `${String(hours).padStart(2, '0')}:${minutes}`;

            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('zh-HK', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchBusETA(route, stopId) {
            const url = `https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${stopId}/${route}`;
            try {
                const response = await fetch(url);
                const json = await response.json();
                if (json && json.data) {
                    let etas = json.data
                        .filter(item => item.stop === stopId && item.eta)
                        .map(item => {
                            const etaTime = new Date(item.eta);
                            const diffMins = Math.max(0, Math.floor((etaTime - new Date()) / 60000));
                            const timeStr = etaTime.toLocaleTimeString('zh-HK', { hour12: false, hour: '2-digit', minute: '2-digit' });
                            return { timeStr, diffMins };
                        });
                    return etas.slice(0, 3);
                }
            } catch (e) {
                console.error(`Bus ${route} ETA error:`, e);
            }
            return [];
        }

        async function updateAllBusETAs() {
            for (const config of busConfigs) {
                const etas = await fetchBusETA(config.route, config.stop);
                const container = document.getElementById(`eta-${config.route}`);
                
                if (!etas || etas.length === 0) {
                    container.innerHTML = `<span class="time-white">現時沒有班次</span>`;
                    continue;
                }

                let htmlContent = '';
                etas.forEach((eta, index) => {
                    const countdownClass = eta.diffMins <= 10 ? 'countdown-red' : 'countdown-white';
                    htmlContent += `<span class="eta-item"><span class="time-white">${eta.timeStr}</span><span class="${countdownClass}">(${eta.diffMins}分鐘)</span></span>`;
                    if (index < etas.length - 1) htmlContent += `<span class="eta-split">|</span>`;
                });
                container.innerHTML = htmlContent;
            }
        }

        // 解析警告子類型（支援具體信號名稱，並回傳統一的紅色圓角樣式）
        function getDetailedWarningText(key, warningObj) {
            const code = warningObj.code;
            let text = warningObj.name || key;

            if (key === 'WRAIN') {
                if (code === 'AMBER') text = '黃色暴雨警告信號';
                else if (code === 'RED') text = '紅色暴雨警告信號';
                else if (code === 'BLACK') text = '黑色暴雨警告信號';
            } else if (key === 'WTCSGNL') {
                if (code === 'TC1') text = '一號戒備信號';
                else if (code === 'TC3') text = '三號強風信號';
                else if (code === 'TC8NE') text = '八號東北烈風信號';
                else if (code === 'TC8NW') text = '八號西北烈風信號';
                else if (code === 'TC8SE') text = '八號東南烈風信號';
                else if (code === 'TC8SW') text = '八號西南烈風信號';
                else if (code === 'TC9') text = '九號烈風信號';
                else if (code === 'TC10') text = '十號颶風信號';
            } else if (key === 'WFIRE') {
                if (code === 'Y') text = '黃色火災危險警告';
                else if (code === 'R') text = '紅色火災危險警告';
            } else if (key === 'WHOT') {
                text = '酷熱天氣警告';
            } else if (key === 'WCOLD') {
                text = '寒冷天氣警告';
            } else if (key === 'WTS') {
                text = '雷暴警告';
            } else if (key === 'WLAND') {
                text = '山泥傾瀉警告';
            } else if (key === 'WFROST') {
                text = '霜凍警告';
            }

            return text;
        }

        async function updateWeather() {
            try {
                // 1. 現時天氣
                const rhrResponse = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const rhrText = await rhrResponse.text();
                if (rhrText) {
                    const rhrData = JSON.parse(rhrText);
                    if (rhrData.temperature && rhrData.temperature.data) {
                        const hkTemp = rhrData.temperature.data.find(item => item.place === '香港天文台');
                        if (hkTemp) document.getElementById('curr-temp').textContent = `${hkTemp.value}°C`;
                        else if (rhrData.temperature.data[0]) document.getElementById('curr-temp').textContent = `${rhrData.temperature.data[0].value}°C`;
                    }
                    if (rhrData.humidity && rhrData.humidity.data && rhrData.humidity.data[0]) {
                        document.getElementById('curr-humidity').textContent = `${rhrData.humidity.data[0].value}%`;
                    }
                    if (rhrData.icon && rhrData.icon[0]) {
                        const iconImg = document.getElementById('wx-icon');
                        iconImg.src = `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${rhrData.icon[0]}.png`;
                        iconImg.style.display = 'inline-block';
                    }
                }

                // 2. 今日最高/最低溫度
                const fndResponse = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const fndText = await fndResponse.text();
                if (fndText) {
                    const fndData = JSON.parse(fndText);
                    if (fndData && fndData.weatherForecast && fndData.weatherForecast[0]) {
                        document.getElementById('forecast-max').textContent = fndData.weatherForecast[0].forecastMaxtemp.value;
                        document.getElementById('forecast-min').textContent = fndData.weatherForecast[0].forecastMintemp.value;
                    }
                }

                // 3. 天氣警告 (統一紅色圓角底 / 白字)
                const warnResponse = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
                const warnText = await warnResponse.text();
                let warnData = null;
                if (warnText) { try { warnData = JSON.parse(warnText); } catch(e) {} }
                
                // 特別天氣提示
                const swtResponse = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=tc');
                const swtText = await swtResponse.text();
                let swtData = null;
                if (swtText) { try { swtData = JSON.parse(swtText); } catch(e) {} }

                const alertPanel = document.getElementById('alert-panel');
                let hasAlerts = false;
                
                let warningsWrapperHtml = '<div class="warnings-wrapper">';
                if (warnData && typeof warnData === 'object') {
                    Object.keys(warnData).forEach(key => {
                        const warning = warnData[key];
                        if (warning && (warning.name || warning.code)) {
                            hasAlerts = true;
                            const warningText = getDetailedWarningText(key, warning);
                            warningsWrapperHtml += `<div class="warning-badge">${warningText}</div>`;
                        }
                    });
                }
                warningsWrapperHtml += '</div>';

                let marqueeHtml = '';
                if (swtData && swtData.swt && swtData.swt.length > 0) {
                    let swtTextStr = '';
                    swtData.swt.forEach(tip => {
                        if (tip.desc) { swtTextStr += `${tip.desc}<br><br>`; }
                    });
                    if (swtTextStr) {
                        hasAlerts = true;
                        marqueeHtml = `
                            <div class="marquee-container">
                                <div class="marquee-content">${swtTextStr}</div>
                            </div>
                        `;
                    }
                }

                if (!hasAlerts) {
                    alertPanel.innerHTML = `<div class="no-alerts">現時沒有生效的警告/提示</div>`;
                } else {
                    const finalWarningsHtml = warnData && Object.keys(warnData).length > 0 ? warningsWrapperHtml : '';
                    alertPanel.innerHTML = finalWarningsHtml + marqueeHtml;
                }

            } catch (e) {
                console.error("天氣數據更新錯誤:", e);
            }
        }

        async function refreshDashboard() {
            await Promise.all([ updateAllBusETAs(), updateWeather() ]);
            const timeStr = new Date().toLocaleTimeString('zh-HK', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('update-timestamp').textContent = `最後更新：${timeStr} (每30秒自動刷新)`;
        }

        refreshDashboard();
        setInterval(refreshDashboard, 30000);
    </script>
</body>
</html>
