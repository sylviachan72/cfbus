<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>置富巴士天氣資訊板</title>
    <style>
        /* 全域樣式：極致緊湊、高對比度 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            letter-spacing: 1px;
        }

        /* 頂部最後更新時間 */
        .top-bar {
            text-align: center;
            color: #AAAAAA;
            font-size: 18px;
            padding: 4px 0;
            background-color: #000000;
            flex-shrink: 0;
            border-bottom: 1px solid #222222;
        }

        /* 主內容區：左右分欄 */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左欄：巴士資訊 (60%) */
        .left-col {
            width: 60%;
            height: 100%;
            overflow-y: auto;
            padding: 6px;
            border-right: 2px solid #333333;
            /* 隱藏滾動條 */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .left-col::-webkit-scrollbar {
            display: none;
        }

        /* 右欄：時間與天氣 (40%) */
