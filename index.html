<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>置富巴士天氣儀表板</title>
    <style>
        /* 全域基本樣式重設 */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* 頂部最後更新時間區塊 */
        .top-header {
            text-align: center;
            font-size: 16px;
            color: #888888;
            padding: 6px 0;
            background-color: #000000;
            border-bottom: 1px solid #222222;
            height: 32px;
        }

        /* 使用傳統 Table 佈局確保跨裝置極致穩定與緊湊 */
        .dashboard-layout {
            display: table;
            width: 100%;
            height: calc(100vh - 32px);
            table-layout: fixed;
        }
        .dashboard-row {
            display: table-row;
        }

        /* 左欄：巴士資訊 (60%) */
        .left-column {
            display: table-cell;
            width: 60%;
            vertical-align: top;
            border-right: 3px solid #222222;
            padding: 0;
            height: 100%;
        }

        /* 右欄：時間與天氣 (40%) */
        .right-column {
            display: table-cell;
            width: 40%;
            vertical-align: top;
            padding: 0;
            height: 100%;
        }

        /* 獨立滾動容器，隱藏滾動條但保持功能 */
        .scroll-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 12px;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .scroll-container::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        /* 巴士排版樣式 (字體不小於 32px) */
        .bus-row {
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #1a1a1a;
        }
        .bus-meta {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .bus-badge {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 12px;
            color: #ffffff;
            margin-right: 10px;
            text-align: center;
        }
        .bus-destination {
            color: #ffffff;
        }
        .bus-station {
            color: #aaaaaa;
            font-size: 26px;
            margin-left: 6px;
        }
        .bus-etas {
            font-size: 34px;
            font-weight: bold;
            line-height: 1.4;
            color: #ffffff;
            white-space: normal;
            word-wrap: break-word;
        }
        .eta-item {
            display: inline-block;
        }
        .eta-item:not(:last-child)::after {
            content: " | ";
            color: #333333;
            padding: 0 10px;
        }
        .countdown-red {
            color: #ff4444;
        }
        .countdown-white {
            color: #ffffff;
        }

        /* 右欄排版樣式 */
        .centered-container {
            display: flex;
            flex-direction: column;
            align-items: center; /* 置中 */
            text-align: center;
        }

        /* 時間與日期區塊 */
        .time-section {
            margin-bottom: 8px;
        }
        .clock-time {
            font-size: 96px;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.0;
            margin: 0;
            padding: 0;
            letter-spacing: -2px;
        }
        .clock-date {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            margin: 2px 0 0 0;
            padding: 0;
            line-height: 1.1;
        }

        /* 天氣區塊樣式 */
        .weather-section {
            margin: 0 0 16px 0;
            padding: 0;
            width: 100%;
        }
        .weather-row1 {
            margin: 0;
            padding: 0;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        .weather-icon {
            width: 58px;
            height: 58px;
            display: none;
        }
        .weather-row2 {
            margin: 0;
            padding: 0;
            font-size: 24px;
            font-weight: bold;
            line-height: 1.1;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .temp-min {
            color: #54a0ff;
        }
        .temp-max {
            color: #ff6b6b;
        }
        .temp-icon {
            font-style: normal;
            margin-right: 4px;
        }

        /* 警告與特別提示區塊 */
        .alerts-section {
            width: 100%;
            margin-top: 10px;
            text-align: left; 
        }
        
        .warnings-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .warn-badge {
            background-color: #cc0000;
            color: #ffffff;
            font-size: 26px;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 10px;
            text-align: center;
            display: inline-block; 
        }
        .no-alerts {
            color: #555555;
            font-size: 24px;
            font-weight: bold;
            margin-top: 8px;
        }

        /* 垂直跑馬燈容器 */
        .marquee-wrapper {
            height: 90px;
            overflow: hidden;
            position: relative;
            border-top: 1px dashed #222222;
            padding-top: 6px;
            display: none;
        }
        .marquee-content {
            font-size: 24px;
            color: #ffffff;
            text-align: left;
            position: absolute;
            width: 100%;
            animation: scrollUpText 15s linear infinite;
        }
        .marquee-content p {
            margin: 0 0 10px 0;
            line-height: 1.25;
        }
        .marquee-wrapper:hover .marquee-content {
            animation-play-state: paused;
        }

        @keyframes scrollUpText {
            0% { transform: translateY(90px); }
            100% { transform: translateY(-100%); }
        }
    </style>
</head>
<body>

    <div class="top-header">
        最後更新：<span id="update-timestamp">--:--:--</span> (每30秒自動刷新)
    </div>

    <div class="dashboard-layout">
        <div class="dashboard-row">
            
            <div class="left-column">
                <div class="scroll-container" id="bus-container">
                    <div style="font-size: 28px; color: #888888; padding: 20px;">正在載入實時巴士班次...</div>
                </div>
            </div>

            <div class="right-column">
                <div class="scroll-container">
                    
                    <div class="centered-container">
                        <div class="time-section">
                            <div class="clock-time" id="clock-time">--:--</div>
                            <div class="clock-date" id="clock-date">----年--月--日 星期-</div>
                        </div>

                        <div class="weather-section">
                            <div class="weather-row1">
                                <img id="weather-img" class="weather-icon" src="" alt="天氣圖標">
                                <span><span id="current-temp">--</span>°C</span>
                                <span>💧 <span id="current-humidity">--</span>%</span>
                            </div>
                            <div class="weather-row2">
                                <span class="temp-min"><i class="temp-icon">❄️</i><span id="min-temp">--°C</span></span>
                                <span class="temp-max"><i class="temp-icon">☀️</i><span id="max-temp">--°C</span></span>
                            </div>
                        </div>
                    </div> 

                    <div class="alerts-section">
                        <div class="warnings-wrapper" id="warnings-container"></div>
                        <div class="no-alerts" id="no-alerts-msg" style="display: none;">現時沒有生效的警告/提示</div>
                        <div class="marquee-wrapper" id="marquee-wrapper">
                            <div class="marquee-content" id="marquee-box"></div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        // 更新後的巴士路線與站點設定 (包含顏色、Stop ID及名稱)
        const routeMeta = {
            '33X': { color: '#1e90ff', stopName: '置富花園 1-7 座' },
            '40':  { color: '#2ed573', stopName: '置富花園 1-7 座' },
            '95C': { color: '#ffa500', stopName: '置富花園 1-7 座' },
            '970X':{ color: '#9b59b6', stopName: '置富花園 1-7 座' },
            '38':  { color: '#ff4757', stopName: '雅緻洋房' },
            '37A': { color: '#10ac84', stopName: '置富總站' },
            '37B': { color: '#ff6b6b', stopName: '置富總站' },
            '37X': { color: '#00d2d3', stopName: '置富總站' }
        };

        // 統一建立一個陣列來控制顯示順序與對應的站點代碼 (城巴Stop ID)
        const allRoutesOrder = [
            { route: '33X', stop: '002184' },
            { route: '40',  stop: '002184' },
            { route: '95C', stop: '002184' },
            { route: '970X',stop: '002184' },
            { route: '38',  stop: '001186' },
            { route: '37A', stop: '002181' },
            { route: '37B', stop: '002181' },
            { route: '37X', stop: '002181' }
        ];

        const warnMap = {
            'WFIREY': '黃色火災危險警告', 'WFIRER': '紅色火災危險警告',
            'WRAINA': '黃色暴雨警告', 'WRAINR': '紅色暴雨警告', 'WRAINB': '黑色暴雨警告',
            'TC1': '一號戒備信號', 'TC3': '三號強風信號',
            'TC8NE': '八號東北烈風或暴風信號', 'TC8SE': '八號東南烈風或暴風信號',
            'TC8SW': '八號西南烈風或暴風信號', 'TC8NW': '八號西北烈風或暴風信號',
            'TC9': '九號烈風或暴風風力增強信號', 'TC10': '十號颶風信號', 'CANCEL': '取消所有熱帶氣旋警告信號'
        };

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            hours = hours % 12;
            hours = hours ? hours : 12; 
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock-time').innerText = `${String(hours).padStart(2, '0')}:${minutes}`;
            
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const date = now.getDate();
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const dayName = days[now.getDay()];
            document.getElementById('clock-date').innerText = `${year}年${month}月${date}日 ${dayName}`;
        }

        async function fetchBusETA(route, stopId) {
            const url = `https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${stopId}/${route}`;
            try {
                const res = await fetch(url);
                const json = await res.json();
                if (json && json.data) {
                    let records = json.data.filter(item => item.stop === stopId && item.eta);
                    records.sort((a, b) => new Date(a.eta) - new Date(b.eta));
                    return records.slice(0, 3); 
                }
            } catch (e) {
                console.error(`無法獲取路線 ${route} 的資訊:`, e);
            }
            return [];
        }

        async function updateBusData() {
            const container = document.getElementById('bus-container');
            
            // 根據 allRoutesOrder 順序同時發送請求
            let promises = allRoutesOrder.map(info => fetchBusETA(info.route, info.stop));
            const results = await Promise.all(promises);
            
            let combinedHtml = '';
            
            allRoutesOrder.forEach((routeInfo, index) => {
                const etas = results[index];
                const meta = routeMeta[routeInfo.route];
                let destination = '---';
                let etaListHtml = '';
                
                if (etas && etas.length > 0) {
                    destination = etas[0].dest_tc ? `往 ${etas[0].dest_tc}` : '';
                    
                    etas.forEach(etaObj => {
                        const etaTime = new Date(etaObj.eta);
                        const now = new Date();
                        const diffMins = Math.max(0, Math.floor((etaTime - now) / 60000));
                        const timeStr = etaObj.eta.substring(11, 16); 
                        
                        const countdownClass = diffMins < 10 ? 'countdown-red' : 'countdown-white';
                        etaListHtml += `<span class="eta-item">${timeStr}<span class="${countdownClass}">(${diffMins}分鐘)</span></span>`;
                    });
                } else {
                    etaListHtml = '<span style="color: #555555; font-size: 26px;">暫無即時班次資訊</span>';
                }
                
                combinedHtml += `
                    <div class="bus-row">
                        <div class="bus-meta">
                            <span class="bus-badge" style="background-color: ${meta.color};">${routeInfo.route}</span>
                            <span class="bus-destination">${destination}</span>
                            <span class="bus-station">📍 ${meta.stopName}</span>
                        </div>
                        <div class="bus-etas">
                            ${etaListHtml}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = combinedHtml;
        }

        async function updateWeatherData() {
            try {
                const [rhr, fnd, warn, swt] = await Promise.all([
                    fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc').then(r => r.json()),
                    fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc').then(r => r.json()),
                    fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc').then(r => r.json()),
                    fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=tc').then(r => r.json())
                ]);

                let tempRecord = rhr.temperature.data.find(t => t.place === '黃竹坑') || rhr.temperature.data[0];
                let currentTemp = tempRecord ? tempRecord.value : '--';
                let humidity = rhr.humidity.data[0] ? rhr.humidity.data[0].value : '--';
                let iconId = rhr.icon[0];

                document.getElementById('current-temp').innerText = currentTemp;
                document.getElementById('current-humidity').innerText = humidity;
                
                if (iconId) {
                    document.getElementById('weather-img').src = `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${iconId}.png`;
                    document.getElementById('weather-img').style.display = 'inline-block';
                }

                if (fnd.weatherForecast && fnd.weatherForecast.length > 0) {
                    let todayFnd = fnd.weatherForecast[0];
                    document.getElementById('min-temp').innerText = `${todayFnd.forecastMintemp.value}°C`;
                    document.getElementById('max-temp').innerText = `${todayFnd.forecastMaxtemp.value}°C`;
                }

                let hasAlertsOrTips = false;
                let warningsHtml = '';
                if (warn && Object.keys(warn).length > 0) {
                    for (let key in warn) {
                        let alertItem = warn[key];
                        if (alertItem && alertItem.code) {
                            let displayName = warnMap[alertItem.code] || alertItem.name;
                            warningsHtml += `<div class="warn-badge">${displayName}</div>`;
                            hasAlertsOrTips = true;
                        }
                    }
                }
                document.getElementById('warnings-container').innerHTML = warningsHtml;

                let swtHtml = '';
                if (swt.specialWeatherTips && swt.specialWeatherTips.length > 0) {
                    hasAlertsOrTips = true;
                    swt.specialWeatherTips.forEach(tip => {
                        if (tip.text) {
                            swtHtml += `<p>${tip.text}</p>`;
                        }
                    });
                    document.getElementById('marquee-box').innerHTML = swtHtml;
                    document.getElementById('marquee-wrapper').style.display = 'block';
                } else {
                    document.getElementById('marquee-wrapper').style.display = 'none';
                }

                if (!hasAlertsOrTips) {
                    document.getElementById('no-alerts-msg').style.display = 'block';
                } else {
                    document.getElementById('no-alerts-msg').style.display = 'none';
                }

            } catch (e) {
                console.error('更新天氣數據時發生錯誤:', e);
            }
        }

        async function refreshDashboard() {
            await Promise.all([updateBusData(), updateWeatherData()]);
            
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('update-timestamp').innerText = `${hh}:${mm}:${ss}`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000); 
            
            refreshDashboard();
            setInterval(refreshDashboard, 30000); 
        });
    </script>
</body>
</html>
