<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>置富巴士天氣資訊板</title>
    <style>
        /* 全域樣式：極致緊湊、高對比度 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            letter-spacing: 1px;
        }

        /* 頂部最後更新時間 */
        .top-bar {
            text-align: center;
            color: #AAAAAA;
            font-size: 18px;
            padding: 4px 0;
            background-color: #000000;
            flex-shrink: 0;
            border-bottom: 1px solid #222222;
        }

        /* 主內容區：左右分欄 */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 左欄：巴士資訊 (60%) */
        .left-col {
            width: 60%;
            height: 100%;
            overflow-y: auto;
            padding: 6px;
            border-right: 2px solid #333333;
            /* 隱藏滾動條 */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .left-col::-webkit-scrollbar {
            display: none;
        }

        /* 右欄：時間與天氣 (40%) */
        .right-col {
            width: 40%;
            height: 100%;
            overflow-y: auto;
            padding: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .right-col::-webkit-scrollbar {
            display: none;
        }

        /* 巴士路線區塊樣式 */
        .bus-row {
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #222222;
            word-wrap: break-word;
            white-space: normal;
        }
        .bus-header {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        /* 路線圓角標籤顏色對應 */
        .route-badge {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 12px;
            color: #FFFFFF;
            margin-right: 10px;
            font-size: 34px;
        }
        .route-33X { background-color: #0056B3; }
        .route-40  { background-color: #1E7E34; }
        .route-95C { background-color: #D39E00; }
        .route-970X{ background-color: #6F42C1; }
        .route-38  { background-color: #C82333; }
        .route-37A { background-color: #17A2B8; }
        .route-37B { background-color: #E83E8C; }
        .route-37X { background-color: #FD7E14; }
        
        .bus-dir {
            color: #FFFFFF;
            margin-right: 8px;
        }
        .bus-stop {
            color: #FFCC00;
            font-size: 30px;
        }

        /* 預計到達時間樣式 */
        .eta-container {
            font-size: 32px;
            font-weight: bold;
            margin-top: 4px;
        }
        .eta-item {
            display: inline-block;
        }
        .eta-split {
            color: #555555;
            margin: 0 8px;
        }
        .time-white { color: #FFFFFF; }
        .countdown-red { color: #FF4444; }
        .countdown-white { color: #FFFFFF; }

        /* 右欄：時間與日期細節 (極致緊湊) */
        .clock-section {
            text-align: center;
            margin-bottom: 0px;
        }
        .clock {
            font-size: 96px;
            font-weight: bold;
            color: #FFFFFF;
            line-height: 1.0;
        }
        .date {
            font-size: 28px;
            color: #FFFFFF;
            margin-top: -4px;
            margin-bottom: 8px;
        }

        /* 天氣報告區塊 (零縫隙貼合) */
        .weather-section {
            width: 100%;
            text-align: center;
        }
        .weather-row1 {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            line-height: 1.1;
        }
        .weather-icon {
            width: 52px;
            height: 52px;
            margin-right: 8px;
        }
        .weather-row2 {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            padding: 0;
            line-height: 1.1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .temp-max { color: #FF4444; }
        .temp-min { color: #44AAFF; }

        /* 天氣警告與提示區塊 */
        .alert-section {
            width: 100%;
            margin-top: 12px;
            text-align: center;
        }
        .warning-badge {
            display: inline-block;
            background-color: #CC0000;
            color: #FFFFFF;
            font-size: 24px;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            width: 100%;
            text-align: center;
        }
        
        /* 垂直跑馬燈容器（限制3行高度） */
        .marquee-container {
            height: 90px;
            overflow: hidden;
            position: relative;
            text-align: left;
            width: 100%;
            border-top: 1px dashed #333333;
            padding-top: 4px;
        }
        .marquee-content {
            position: absolute;
            width: 100%;
            font-size: 24px;
            color: #FFFFFF;
            line-height: 30px;
            animation: scrollUp 20s linear infinite;
        }
        .marquee-content:hover {
            animation-play-state: paused;
        }
        @keyframes scrollUp {
            0% { transform: translateY(90px); }
            100% { transform: translateY(-100%); }
        }

        /* 無警告提示時的暗灰色樣式 */
        .no-alerts {
            color: #666666;
            font-size: 24px;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="top-bar" id="update-timestamp">最後更新：載入中... (每30秒自動刷新)</div>

    <div class="main-content">
        
        <div class="left-col" id="bus-panel">
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-33X">33X</span><span class="bus-dir">往西九龍站</span><span class="bus-stop">📍置富1-7座</span></div><div class="eta-container" id="eta-33X">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-40">40</span><span class="bus-dir">往灣仔北</span><span class="bus-stop">📍置富1-7座</span></div><div class="eta-container" id="eta-40">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-95C">95C</span><span class="bus-dir">往鴨脷洲邨</span><span class="bus-stop">📍置富1-7座</span></div><div class="eta-container" id="eta-95C">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-970X">970X</span><span class="bus-dir">往蘇屋</span><span class="bus-stop">📍置富1-7座</span></div><div class="eta-container" id="eta-970X">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-38">38</span><span class="bus-dir">往筲箕灣</span><span class="bus-stop">📍雅緻洋房</span></div><div class="eta-container" id="eta-38">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-37A">37A</span><span class="bus-dir">往中環</span><span class="bus-stop">📍置富總站</span></div><div class="eta-container" id="eta-37A">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-37B">37B</span><span class="bus-dir">往金鐘</span><span class="bus-stop">📍置富總站</span></div><div class="eta-container" id="eta-37B">讀取中...</div></div>
            <div class="bus-row"><div class="bus-header"><span class="route-badge route-37X">37X</span><span class="bus-dir">往中環(特快)</span><span class="bus-stop">📍置富總站</span></div><div class="eta-container" id="eta-37X">讀取中...</div></div>
        </div>

        <div class="right-col">
            <div class="clock-section">
                <div class="clock" id="clock">00:00</div>
                <div class="date" id="date">2026年7月6日 星期一</div>
            </div>

            <div class="weather-section">
                <div class="weather-row1">
                    <img src="" alt="天氣圖標" class="weather-icon" id="wx-icon" style="display:none;">
                    <span id="curr-temp">--°C</span>(青衣) 
                    <span style="margin-left:12px;">💧</span><span id="curr-humidity">--%</span>
                </div>
                <div class="weather-row2">
                    <span class="temp-max">☀️ <span id="forecast-max">--</span>°C</span>
                    <span class="temp-min">❄️ <span id="forecast-min">--</span>°C</span>
                </div>
            </div>

            <div class="alert-section" id="alert-panel">
                <div class="no-alerts">現時沒有生效的警告/提示</div>
            </div>
        </div>

    </div>

    <script>
        // 配置巴士路線與對應的站點資料
        const busConfigs = [
            { route: '33X', stop: '002184' },
            { route: '40',  stop: '002184' },
            { route: '95C', stop: '002184' },
            { route: '970X',stop: '002184' },
            { route: '38',  stop: '002190' },
            { route: '37A', stop: '002186' },
            { route: '37B', stop: '002186' },
            { route: '37X', stop: '002186' }
        ];

        // 12小時制時鐘（不含上下午，大字體）
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            hours = hours % 12;
            hours = hours ? hours : 12; // 0點顯示為12
            const hoursStr = String(hours).padStart(2, '0');
            
            document.getElementById('clock').textContent = `${hoursStr}:${minutes}`;

            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('zh-HK', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 獲取實時巴士 ETA
        async function fetchBusETA(route, stopId) {
            const url = `https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${stopId}/${route}`;
            try {
                const response = await fetch(url);
                const json = await response.getJson ? await response.json() : await response.json();
                if (json && json.data) {
                    // 過濾出同一車站且有給出預計時間的數據
                    let etas = json.data
                        .filter(item => item.stop === stopId && item.eta)
                        .map(item => {
                            const etaTime = new Date(item.eta);
                            const now = new Date();
                            const diffMs = etaTime - now;
                            const diffMins = Math.max(0, Math.floor(diffMs / 60000));
                            
                            // 格式化為 HH:mm 格式
                            const timeStr = etaTime.toLocaleTimeString('zh-HK', { hour12: false, hour: '2-digit', minute: '2-digit' });
                            return { timeStr, diffMins };
                        });
                    
                    // 只取最近3個班次
                    return etas.slice(0, 3);
                }
            } catch (e) {
                console.error(`無法獲取巴士 ${route} 的資訊`, e);
            }
            return [];
        }

        // 更新巴士面板的 UI
        async function updateAllBusETAs() {
            for (const config of busConfigs) {
                const etas = await fetchBusETA(config.route, config.stop);
                const container = document.getElementById(`eta-${config.route}`);
                
                if (!etas || etas.length === 0) {
                    container.innerHTML = `<span class="time-white">現時沒有班次</span>`;
                    continue;
                }

                let htmlContent = '';
                etas.forEach((eta, index) => {
                    const countdownClass = eta.diffMins <= 10 ? 'countdown-red' : 'countdown-white';
                    htmlContent += `
                        <span class="eta-item">
                            <span class="time-white">${eta.timeStr}</span><span class="${countdownClass}">(${eta.diffMins}分鐘)</span>
                        </span>
                    `;
                    if (index < etas.length - 1) {
                        htmlContent += `<span class="eta-split">|</span>`;
                    }
                });
                container.innerHTML = htmlContent;
            }
        }

        // 獲取天文台天氣數據
        async function updateWeather() {
            try {
                // 1. 現時天氣 (溫度、濕度、圖標編號)
                const rhrResponse = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const rhrData = await rhrResponse.json();
                
                if (rhrData) {
                    // 尋找青衣區溫度
                    if (rhrData.temperature && rhrData.temperature.data) {
                        const tsingYiTemp = rhrData.temperature.data.find(item => item.place === '青衣');
                        if (tsingYiTemp) {
                            document.getElementById('curr-temp').textContent = `${tsingYiTemp.value}°C`;
                        } else if (rhrData.temperature.data[0]) {
                            document.getElementById('curr-temp').textContent = `${rhrData.temperature.data[0].value}°C`;
                        }
                    }
                    // 濕度
                    if (rhrData.humidity && rhrData.humidity.data && rhrData.humidity.data[0]) {
                        document.getElementById('curr-humidity').textContent = `${rhrData.humidity.data[0].value}%`;
                    }
                    // 透明線條天氣圖標 (HKOWxIconOutline)
                    if (rhrData.icon && rhrData.icon[0]) {
                        const iconImg = document.getElementById('wx-icon');
                        iconImg.src = `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${rhrData.icon[0]}.png`;
                        iconImg.style.display = 'inline-block';
                    }
                }

                // 2. 今日最高/最低溫度
                const fndResponse = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const fndData = await fndResponse.json();
                if (fndData && fndData.weatherForecast && fndData.weatherForecast[0]) {
                    document.getElementById('forecast-max').textContent = fndData.weatherForecast[0].forecastMaxTemp.value;
                    document.getElementById('forecast-min').textContent = fndData.weatherForecast[0].forecastMinTemp.value;
                }

                // 3. 天氣警告與特別天氣提示資訊整合
                const warnResponse = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
                const warnData = await warnResponse.json();
                
                const swtResponse = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=tc');
                const swtData = await swtResponse.json();

                const alertPanel = document.getElementById('alert-panel');
                let alertHtml = '';

                // 解析天氣警告 (有生效 status: 1 則顯示)
                if (warnData) {
                    Object.keys(warnData).forEach(key => {
                        const warning = warnData[key];
                        if (warning && warning.status === 1) {
                            alertHtml += `<div class="warning-badge">${warning.name}</div>`;
                        }
                    });
                }

                // 解析特別天氣提示 (製作垂直跑馬燈)
                if (swtData && swtData.swt && swtData.swt.length > 0) {
                    let swtText = '';
                    swtData.swt.forEach(tip => {
                        if (tip.desc) {
                            swtText += `${tip.desc}<br><br>`;
                        }
                    });

                    if (swtText) {
                        alertHtml += `
                            <div class="marquee-container">
                                <div class="marquee-content">${swtText}</div>
                            </div>
                        `;
                    }
                }

                // 如果完全沒有警告與提示，顯示暗灰色預設文字
                if (!alertHtml) {
                    alertPanel.innerHTML = `<div class="no-alerts">現時沒有生效的警告/提示</div>`;
                } else {
                    alertPanel.innerHTML = alertHtml;
                }

            } catch (e) {
                console.error("更新天氣數據時出錯", e);
            }
        }

        // 頂部全域刷新控制（每 30 秒自動更新所有數據）
        async function refreshDashboard() {
            await Promise.all([
                updateAllBusETAs(),
                updateWeather()
            ]);
            
            // 更新頂部最後刷新時間
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-HK', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('update-timestamp').textContent = `最後更新：${timeStr} (每30秒自動刷新)`;
        }

        // 初始化與定時器設定
        refreshDashboard();
        setInterval(refreshDashboard, 30000);
    </script>
</body>
</html>
