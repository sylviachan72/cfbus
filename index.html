<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1043資訊板</title>
    <style>
        /* 全域基本設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
        }
        body {
            background-color: #000000;
            color: #FFFFFF;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 5px;
        }

        /* 頂部最後更新時間 */
        #update-header {
            text-align: center;
            font-size: 20px;
            color: #888888;
            padding: 2px 0;
            flex-shrink: 0;
        }

        /* 主版面配置：左 60% 右 40% */
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 30px);
            overflow: hidden;
        }

        /* 獨立滾動欄位設定（隱藏滾動條） */
        .left-column {
            width: 60%;
            height: 100%;
            overflow-y: auto;
            padding-right: 10px;
            border-right: 1px solid #222222;
        }
        .right-column {
            width: 40%;
            height: 100%;
            overflow-y: auto;
            padding-left: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .left-column::-webkit-scrollbar,
        .right-column::-webkit-scrollbar {
            display: none;
        }

        /* ==================== 左欄：巴士樣式 ==================== */
        .bus-row {
            padding: 12px 0;
            border-bottom: 1px solid #222222;
            font-size: 32px;
            word-wrap: break-word;
            word-break: break-all;
        }
        .bus-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }
        .route-badge {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 34px;
            color: #FFFFFF;
            margin-right: 10px;
        }
        .bus-destination {
            color: #FFFFFF;
            margin-right: 10px;
        }
        .bus-station {
            color: #AAAAAA;
            font-size: 28px;
        }
        .eta-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .eta-item {
            white-space: nowrap;
        }
        .time-normal { color: #FFFFFF; }
        .countdown-normal { color: #FFFFFF; }
        .countdown-urgent { color: #FF3B30; font-weight: bold; }

        /* ==================== 右欄：時間與天氣樣式 ==================== */
        .time-box {
            font-size: 96px;
            font-weight: bold;
            color: #FFFFFF;
            line-height: 1.0;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .date-box {
            font-size: 24px;
            color: #FFFFFF;
            text-align: center;
            margin-top: -5px; 
            margin-bottom: 15px;
        }
        
        .weather-info-block {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 15px;
        }
        .weather-line1 {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
        }
        .weather-icon {
            width: 55px;
            height: 55px;
            margin-right: 5px;
        }
        .weather-line2 {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0;
            padding: 0;
            line-height: 1.0;
        }
        .temp-max { color: #FF6666; margin-left: 15px; }
        .temp-min { color: #66B2FF; }

        .warning-box {
            width: 90%;
            text-align: center;
            margin-bottom: 15px;
        }
        .warning-badge {
            display: inline-block;
            background-color: #FF3B30;
            color: #FFFFFF;
            font-size: 26px;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 10px;
            margin: 4px;
        }
        .no-warning {
            color: #555555;
            font-size: 24px;
            text-align: center;
        }

        .swt-container {
            width: 100%;
            height: 90px;
            overflow: hidden;
            position: relative;
            font-size: 24px;
            color: #FFFFFF;
            text-align: left;
            border-top: 1px dashed #333333;
            padding-top: 8px;
        }
        .marquee-content {
            position: absolute;
            width: 100%;
            animation: marqueeUp 15s linear infinite;
        }
        .marquee-content:hover {
            animation-play-state: paused;
        }
        @keyframes marqueeUp {
            0% { top: 100%; }
            100% { top: -100%; }
        }
    </style>
</head>
<body>

    <div id="update-header">最後更新：--:--:-- (每30秒自動刷新)</div>

    <div class="main-container">
        
        <!-- 左欄：巴士 -->
        <div class="left-column" id="bus-panel">
            <div style="color: #555555; font-size: 32px; padding: 20px;">巴士數據載入中...</div>
        </div>

        <!-- 右欄：天氣與時間 -->
        <div class="right-column">
            <div class="time-box" id="live-time">00:00</div>
            <div class="date-box" id="live-date">2026年1月1日 星期一</div>

            <div class="weather-info-block">
                <div class="weather-line1">
                    <img id="wx-icon" class="weather-icon" src="" alt="" style="display:none;">
                    <span id="curr-temp">--°C</span>
                    <span id="curr-humidity" style="margin-left:15px;">💧 --%</span>
                </div>
                <div class="weather-line2">
                    <span class="temp-min">❄️ <span id="forecast-min">--</span>°C</span>
                    <span class="temp-max">☀️ <span id="forecast-max">--</span>°C</span>
                </div>
            </div>

            <!-- 天氣警告 -->
            <div class="warning-box" id="warning-panel">
                <div class="no-warning">現時沒有生效的警告/提示</div>
            </div>

            <!-- 特別天氣提示 -->
            <div class="swt-container" id="swt-panel" style="display:none;">
                <div class="marquee-content" id="swt-text"></div>
            </div>
        </div>
    </div>

    <script>
        const routeColors = {
            '33X': '#007AFF', '40': '#34C759', '95C': '#FF9500', '970X': '#AF52DE',
            '38': '#FF2D55', '37A': '#5AC8FA', '37B': '#FFCC00', '37X': '#E55737'
        };

        const busConfig = [
            { route: '33X', stopId: '002184', stopName: '置富花園1-7座' },
            { route: '40',  stopId: '002184', stopName: '置富花園1-7座' },
            { route: '95C', stopId: '002184', stopName: '置富花園1-7座' },
            { route: '970X',stopId: '002184', stopName: '置富花園1-7座' },
            { route: '38',  stopId: '002190', stopName: '雅緻洋房' },
            { route: '37A', stopId: '002186', stopName: '置富花園總站' },
            { route: '37B', stopId: '002186', stopName: '置富花園總站' },
            { route: '37X', stopId: '002186', stopName: '置富花園總站' }
        ];

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            hours = hours % 12;
            hours = hours ? hours : 12;
            document.getElementById('live-time').innerText = String(hours).padStart(2, '0') + ':' + minutes;

            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            document.getElementById('live-date').innerText = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${weekDays[now.getDay()]}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function setUpdateHeader() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('update-header').innerText = `最後更新：${h}:${m}:${s} (每30秒自動刷新)`;
        }

        async function fetchBusETA() {
            const panel = document.getElementById('bus-panel');
            let htmlContent = '';

            for (const config of busConfig) {
                try {
                    const res = await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${config.stopId}/${config.route}`);
                    const json = await res.json();
                    
                    const etaList = (json.data || [])
                        .filter(item => item.rmk_tc !== "距離太遠，未能提供時間")
                        .slice(0, 3);

                    let destText = "往港島/九龍";
                    if (etaList.length > 0 && etaList[0].dest_tc) destText = `往 ${etaList[0].dest_tc}`;

                    const badgeColor = routeColors[config.route] || '#333333';

                    htmlContent += `
                        <div class="bus-row">
                            <div class="bus-header">
                                <span class="route-badge" style="background-color: ${badgeColor};">${config.route}</span>
                                <span class="bus-destination">${destText}</span>
                                <span class="bus-station">📍${config.stopName}</span>
                            </div>
                            <div class="eta-container">
                    `;

                    if (etaList.length === 0) {
                        htmlContent += `<div style="font-size:28px; color:#555555;">暫無即時班次資料</div>`;
                    } else {
                        etaList.forEach((eta, index) => {
                            if (!eta.eta) return;
                            const etaTime = new Date(eta.eta);
                            const diffMins = Math.max(0, Math.floor((etaTime - new Date()) / 1000 / 60));
                            const countdownClass = diffMins < 10 ? 'countdown-urgent' : 'countdown-normal';
                            const HH = String(etaTime.getHours()).padStart(2, '0');
                            const MM = String(etaTime.getMinutes()).padStart(2, '0');

                            htmlContent += `
                                <div class="eta-item">
                                    <span class="time-normal">${HH}:${MM}</span><span class="${countdownClass}">(${diffMins}分鐘)</span>
                                    ${index < etaList.length - 1 ? ' <span style="color:#333333; margin:0 4px;">|</span> ' : ''}
                                </div>
                            `;
                        });
                    }
                    htmlContent += `</div></div>`;
                } catch (e) {
                    console.error(`讀取巴士路線 ${config.route} 出錯`, e);
                }
            }
            panel.innerHTML = htmlContent || '<div class="no-warning">暫時無法取得巴士資料</div>';
        }

        async function fetchWeather() {
            try {
                // 1. 實時天氣
                const resRhr = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
                const dataRhr = await resRhr.json();
                
                let hkoTemp = '--';
                if (dataRhr.temperature && dataRhr.temperature.data) {
                    const hkoStation = dataRhr.temperature.data.find(t => t.place === '香港天文台');
                    if (hkoStation) hkoTemp = hkoStation.value;
                }
                // 修復：已移除地點名稱
                document.getElementById('curr-temp').innerText = `${hkoTemp}°C`;

                if (dataRhr.humidity && dataRhr.humidity.data && dataRhr.humidity.data[0]) {
                    document.getElementById('curr-humidity').innerText = `💧 ${dataRhr.humidity.data[0].value}%`;
                }

                if (dataRhr.icon && dataRhr.icon[0]) {
                    const iconImg = document.getElementById('wx-icon');
                    iconImg.src = `https://www.weather.gov.hk/images/HKOWxIconOutline/pic${dataRhr.icon[0]}.png`;
                    iconImg.style.display = 'inline-block';
                }

                // 2. 預測溫度
                const resFnd = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const dataFnd = await resFnd.json();
                if (dataFnd.weatherForecast && dataFnd.weatherForecast[0]) {
                    document.getElementById('forecast-min').innerText = dataFnd.weatherForecast[0].forecastMintemp.value;
                    document.getElementById('forecast-max').innerText = dataFnd.weatherForecast[0].forecastMaxtemp.value;
                }

                // 3. 天氣警告 (修復：直接讀取天文台提供的子類型精確名稱 item.name)
                const resWarn = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
                const dataWarn = await resWarn.json();
                const warningPanel = document.getElementById('warning-panel');
                let warningBadges = '';

                if (dataWarn && Object.keys(dataWarn).length > 0) {
                    Object.keys(dataWarn).forEach(key => {
                        const item = dataWarn[key];
                        if (item && item.name) {
                            warningBadges += `<span class="warning-badge">${item.name}</span>`;
                        }
                    });
                }
                warningPanel.innerHTML = warningBadges || `<div class="no-warning">現時沒有生效的警告/提示</div>`;

                // 4. 特別天氣提示 (修復：更正 API 取值路徑為 dataSwt.swt)
                const resSwt = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=tc');
                const dataSwt = await resSwt.json();
                const swtPanel = document.getElementById('swt-panel');
                const swtText = document.getElementById('swt-text');

                if (dataSwt && dataSwt.swt && dataSwt.swt.length > 0) {
                    let tipsCombined = '';
                    dataSwt.swt.forEach(tip => {
                        tipsCombined += tip.desc + ' ';
                    });
                    swtText.innerText = tipsCombined;
                    swtPanel.style.display = 'block';
                } else {
                    swtPanel.style.display = 'none';
                }

            } catch (e) {
                console.error("更新天氣數據失敗", e);
            }
        }

        async function updateAllData() {
            setUpdateHeader();
            await Promise.all([fetchBusETA(), fetchWeather()]);
        }

        updateAllData();
        setInterval(updateAllData, 30000);
    </script>
</body>
</html>
