<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>置富資訊看板</title>
    <style>
        /* 全域設定 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif; }
        body { background-color: #000000; color: #ffffff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* 頂部最後更新時間 */
        .top-bar { width: 100%; text-align: center; font-size: 24px; color: #ffffff; padding: 2px 0; background-color: #111111; font-weight: bold; }

        /* 左右分欄佈局 */
        .main-container { display: flex; flex: 1; height: calc(100vh - 36px); overflow: hidden; }

        /* 左欄 (70%) */
        .left-col { width: 70%; border-right: 2px solid #222222; padding: 4px 12px; overflow-y: auto; scrollbar-width: none; }
        .left-col::-webkit-scrollbar { display: none; }

        /* 右欄 (30%) */
        .right-col { width: 30%; padding: 4px 8px; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: none; }
        .right-col::-webkit-scrollbar { display: none; }

        /* 巴士樣式 */
        .bus-row { padding: 8px 0; border-bottom: 1px solid #222222; }
        .bus-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .bus-tag { font-weight: bold; font-size: 32px; padding: 2px 14px; border-radius: 12px; min-width: 90px; text-align: center; }
        .bus-dest { font-size: 32px; font-weight: bold; }
        .bus-eta-container { font-size: 36px; font-weight: bold; margin-top: 2px; }
        .eta-split { color: #555555; margin: 0 8px; }
        .countdown-urgent { color: #ff4d4d; }
        .countdown-normal { color: #ffffff; }

        /* 右欄模組 */
        .time-block { text-align: center; margin-bottom: 10px; }
        #current-time { font-size: 72px; font-weight: bold; line-height: 1.0; }
        #current-date { font-size: 20px; font-weight: bold; }
        .weather-block { text-align: center; margin-bottom: 10px; }
        .weather-row1 { display: flex; align-items: center; justify-content: center; font-size: 26px; gap: 8px; }
        .weather-icon-img { width: 40px; height: 40px; }
        .weather-row2 { font-size: 18px; display: flex; justify-content: center; gap: 12px; }
        
        /* 警告與提示 */
        .warning-block { margin-top: 10px; text-align: center; }
        .warning-tag { background-color: #cc0000; color: #ffffff; font-size: 18px; font-weight: bold; padding: 4px 10px; border-radius: 8px; display: inline-block; margin: 2px; }
        .no-data { font-size: 20px; color: #666666; font-weight: bold; text-align: center; padding-top: 20px; }
        
        .swt-block { margin-top: 10px; border-top: 1px dashed #333333; padding-top: 8px; height: 90px; overflow: hidden; position: relative; }
        .swt-marquee-content { font-size: 20px; color: #ffffff; text-align: left; position: absolute; width: 100%; animation: scrollUp 15s linear infinite; }
        .swt-marquee-content p { margin-bottom: 6px; line-height: 1.2; }
        @keyframes scrollUp { 0% { transform: translateY(90px); } 100% { transform: translateY(-100%); } }
    </style>
</head>
<body>

    <div class="top-bar">最後更新時間：<span id="last-update">--:--:--</span>(每30秒自動刷新)</div>

    <div class="main-container">
        <div class="left-col" id="bus-list"></div>
        <div class="right-col">
            <div class="time-block">
                <div id="current-time">--:--</div>
                <div id="current-date">----年--月--日</div>
            </div>
            <div class="weather-block">
                <div class="weather-row1">
                    <img id="wx-icon" class="weather-icon-img" src="" alt="" style="display:none;">
                    <span id="curr-temp">--°C</span>
                    <span id="curr-humidity">💧--%</span>
                </div>
                <div class="weather-row2">
                    <span class="temp-max">☀️ <span id="forecast-max">--</span>°C</span>
                    <span class="temp-min">❄️ <span id="forecast-min">--</span>°C</span>
                </div>
            </div>
            <div class="warning-block" id="warning-container"></div>
            <div class="swt-block" id="swt-container">
                <div class="swt-marquee-content" id="swt-content"></div>
            </div>
        </div>
    </div>

    <script>
        const busConfig = [
            { route: '33X',  stop: '002184', name: '置富1-7座', color: '#0056b3', circular: false },
            { route: '40',   stop: '002184', name: '置富1-7座', color: '#d97706', circular: false },
            { route: '95C',  stop: '002184', name: '置富1-7座', color: '#16a34a', circular: false },
            { route: '970X', stop: '002184', name: '置富1-7座', color: '#7c3aed', circular: false },
            { route: '38',   stop: '002190', name: '雅緻洋房', color: '#dc2626', circular: false },
            { route: '37A',  stop: '002186', name: '置富總站', color: '#0891b2', circular: true },
            { route: '37B',  stop: '002186', name: '置富總站', color: '#db2777', circular: true },
            { route: '37X',  stop: '002186', name: '置富總站', color: '#854d0e', circular: true }
        ];

        const warningMap = { "WFIREY": "黃色火災危險警告", "WFIRER": "紅色火災危險警告", "WRAINA": "黃色暴雨警告信號", "WRAINR": "紅色暴雨警告信號", "WRAINB": "黑色暴雨警告信號", "TC1": "一號戒備信號", "TC3": "三號強風信號", "TC8NE": "八號東北烈風或暴風信號", "TC8SE": "八號東南烈風或暴風信號", "TC8SW": "八號西南烈風或暴風信號", "TC8NW": "八號西北烈風或暴風信號", "TC9": "九號烈風或暴風風力增強信號", "TC10": "十號颶風信號" };

        async function refreshAll() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('zh-HK', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('current-date').innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][now.getDay()]}`;
            document.getElementById('last-update').innerText = now.toLocaleTimeString('zh-HK', {hour12:false});

            const list = document.getElementById('bus-list');
            list.innerHTML = '';
            for(const bus of busConfig) {
                try {
                    const res = await (await fetch(`https://rt.data.gov.hk/v1/transport/citybus-nwfb/eta/CTB/${bus.stop}/${bus.route}`)).json();
                    let etas = res.data?.filter(i => i.route === bus.route) || [];
                    if(bus.circular) etas = etas.filter(i => !i.dest_tc.includes('置富'));
                    etas = etas.slice(0, 3);
                    const html = etas.length > 0 ? etas.map(i => {
                        const mins = Math.max(0, Math.floor((new Date(i.eta) - now)/60000));
                        return `<span class="eta-item">${new Date(i.eta).toLocaleTimeString('zh-HK',{hour:'2-digit',minute:'2-digit'})}<span class="${mins<10?'countdown-urgent':'countdown-normal'}">(${mins}分鐘)</span></span>`;
                    }).join('<span class="eta-split">｜</span>') : '暫無班次';
                    list.innerHTML += `<div class="bus-row"><div class="bus-header"><span class="bus-tag" style="background-color:${bus.color}">${bus.route}</span><span class="bus-dest">${etas[0]?.dest_tc || ''}</span></div><div class="bus-eta-container">${html}</div></div>`;
                } catch(e) {}
            }

            const rhr = await (await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc')).json();
            const fnd = await (await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc')).json();
            document.getElementById('curr-temp').innerText = `${rhr.temperature?.data.find(i=>i.place==='香港天文台')?.value || '--'}°C`;
            document.getElementById('curr-humidity').innerText = `💧${rhr.humidity?.data[0].value}%`;
            if(rhr.icon) { document.getElementById('wx-icon').src=`https://www.hko.gov.hk/images/HKOWxIconOutline/pic${rhr.icon[0]}.png`; document.getElementById('wx-icon').style.display='inline-block'; }
            document.getElementById('forecast-max').innerText = fnd.weatherForecast[0].forecastMaxtemp.value;
            document.getElementById('forecast-min').innerText = fnd.weatherForecast[0].forecastMintemp.value;

            const warn = await (await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc')).json();
            const warnKeys = Object.keys(warn);
            document.getElementById('warning-container').innerHTML = warnKeys.length ? warnKeys.map(k => `<div class="warning-tag">${warningMap[warn[k].code || k] || warn[k].name}</div>`).join('') : '<div class="no-data" style="color:#666666; font-size:18px;">現時沒有生效的警告</div>';

            const swt = await (await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=swt&lang=tc')).json();
            const content = document.getElementById('swt-content');
            if(swt.swt?.length) {
                content.style.animation = 'scrollUp 15s linear infinite';
                content.innerHTML = swt.swt.map(s => `<p>${s.desc}</p>`).join('');
            } else {
                content.style.animation = 'none';
                content.innerHTML = '<div class="no-data">現時沒有特別天氣提示</div>';
            }
        }

        refreshAll();
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
